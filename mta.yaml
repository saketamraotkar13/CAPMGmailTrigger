_schema-version: "3.3"
ID: emailcapm
description: A simple CAP project.
version: 1.0.0
modules:
- name: emailcapm-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: mail-xsuaa
  - name: mail-connectivity
  - name: mail-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
resources:
- name: mail-xsuaa
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      tenant-mode: dedicated
      xsappname: mail-xsuaa-${org}-${space}
    service: xsuaa
    service-plan: application
- name: mail-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: mail-destination
  type: org.cloudfoundry.managed-service
  parameters:
    service: destination
    service-plan: lite
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production